    <script>
      const SELECTOR_SIDEBAR_WRAPPER = ".sidebar-wrapper";
      const Default = {
        scrollbarTheme: "os-theme-light",
        scrollbarAutoHide: "leave",
        scrollbarClickScroll: true,
      };
      document.addEventListener("DOMContentLoaded", function () {
        const sidebarWrapper = document.querySelector(SELECTOR_SIDEBAR_WRAPPER);

        // Disable OverlayScrollbars on mobile devices to prevent touch interference
        const isMobile = window.innerWidth <= 992;

        if (
          sidebarWrapper &&
          OverlayScrollbarsGlobal?.OverlayScrollbars !== undefined &&
          !isMobile
        ) {
          OverlayScrollbarsGlobal.OverlayScrollbars(sidebarWrapper, {
            scrollbars: {
              theme: Default.scrollbarTheme,
              autoHide: Default.scrollbarAutoHide,
              clickScroll: Default.scrollbarClickScroll,
            },
          });
        }
      });
    </script>

    <!-- Lógica para cargar datos desde el servidor -->
    <script>
      document.addEventListener("DOMContentLoaded", async function () {
        const tableBody = document.getElementById("bosquejos-table-body");
        const searchInput = document.querySelector(
          'input[name="table_search"]',
        );
        const sortSelect = document.getElementById("sort-date");
        let bosquejosOriginales = [];

        async function fetchBosquejos() {
          try {
            const response = await fetch("http://localhost:3000/api/bosquejos");
            if (!response.ok) throw new Error("Error al obtener datos");

            bosquejosOriginales = await response.json();
            updateDisplay();
          } catch (error) {
            console.error("Error:", error);
            tableBody.innerHTML =
              '<tr><td colspan="5" class="text-center text-danger">Error al conectar con el servidor</td></tr>';
          }
        }

        function updateDisplay() {
          const term = searchInput.value.toLowerCase();
          const sortVal = sortSelect.value;

          // 1. Filtrar
          let filtered = bosquejosOriginales.filter(
            (b) =>
              b.titulo.toLowerCase().includes(term) ||
              b.num.toString().includes(term),
          );

          // 2. Ordenar
          if (sortVal === "recent") {
            filtered.sort((a, b) => {
              if (!a.fecha_ult) return 1;
              if (!b.fecha_ult) return -1;
              return new Date(b.fecha_ult) - new Date(a.fecha_ult);
            });
          } else if (sortVal === "oldest") {
            filtered.sort((a, b) => {
              if (!a.fecha_ult) return 1;
              if (!b.fecha_ult) return -1;
              return new Date(a.fecha_ult) - new Date(b.fecha_ult);
            });
          }

          renderTable(filtered);
        }

        function renderTable(data) {
          tableBody.innerHTML = "";
          const now = new Date();
          const threeMonthsAgo = new Date();
          threeMonthsAgo.setMonth(now.getMonth() - 3);
          const sixMonthsAgo = new Date();
          sixMonthsAgo.setMonth(now.getMonth() - 6);

          data.forEach((item) => {
            const tr = document.createElement("tr");

            // Ajuste para evitar que el timezone cambie la fecha al mostrarla
            let rawFecha = "";
            if (item.fecha_ult) {
              const d = new Date(item.fecha_ult);
              rawFecha = new Date(d.getTime() - d.getTimezoneOffset() * 60000)
                .toISOString()
                .split("T")[0];
            }
            const fechaStr = rawFecha
              ? rawFecha.split("-").reverse().join("-")
              : "--";

            let badgeClass = "";
            let badgeStyle = "";
            let statusText = "";

            if (!item.fecha_ult) {
              badgeClass = "text-bg-success"; // Verde
              statusText = "Disponible";
            } else {
              const lastDate = new Date(item.fecha_ult);
              if (lastDate >= threeMonthsAgo) {
                badgeClass = "text-bg-danger"; // Rojo
                statusText = "Muy reciente";
              } else if (lastDate >= sixMonthsAgo) {
                badgeClass = "text-white";
                badgeStyle = 'style="background-color: #fd7e14;"'; // Naranja vibrante (Bootstrap orange)
                statusText = "Reciente";
              } else {
                badgeClass = "text-bg-warning"; // Amarillo
                statusText = "Presentado";
              }
            }

            tr.innerHTML = `
              <td>${item.num}</td>
              <td>${item.titulo}</td>
              <td>${fechaStr}</td>
              <td><span class="badge ${badgeClass}" ${badgeStyle}>${statusText}</span></td>
              <td>
                <button class="btn btn-sm btn-outline-primary edit-btn" 
                        data-id="${item.num}" 
                        data-num="${item.num}" 
                        data-titulo="${item.titulo}" 
                        data-fecha="${rawFecha}"
                        title="Modificar fecha">
                  <i class="bi bi-calendar-event"></i>
                </button>
                <button class="btn btn-sm btn-outline-secondary edit-title-btn ms-1" 
                        data-id="${item.num}" 
                        data-num="${item.num}" 
                        data-titulo="${item.titulo}" 
                        title="Editar tema">
                  <i class="bi bi-pencil-square"></i>
                </button>
              </td>
            `;
            tableBody.appendChild(tr);
          });
        }

        // Abrir modal y cargar datos
        tableBody.addEventListener("click", (e) => {
          const dateBtn = e.target.closest(".edit-btn");
          const titleBtn = e.target.closest(".edit-title-btn");

          if (dateBtn) {
            const { id, num, titulo, fecha } = dateBtn.dataset;
            document.getElementById("edit-id").value = id;
            document.getElementById("edit-speech-info").innerText =
              `Bosquejo #${num}: ${titulo}`;
            document.getElementById("edit-fecha").value = fecha;
            new bootstrap.Modal(document.getElementById("editModal")).show();
          } else if (titleBtn) {
            const { id, num, titulo } = titleBtn.dataset;
            document.getElementById("edit-title-id").value = id;
            document.getElementById("edit-title-info").innerText =
              `Actualizando Bosquejo #${num}`;
            document.getElementById("edit-titulo-input").value = titulo;
            new bootstrap.Modal(
              document.getElementById("editTitleModal"),
            ).show();
          }
        });

        /**
         * Función reutilizable para mostrar notificaciones (Toasts)
         */
        function showNotification(message, type = "success", errorCode = null) {
          const toastContainer = document.getElementById("toastContainer");
          const toastId = "toast-" + Date.now();
          const bgClass =
            type === "success" ? "text-bg-success" : "text-bg-danger";
          const icon =
            type === "success"
              ? "bi-check-circle-fill"
              : "bi-exclamation-triangle-fill";

          let bodyContent = message;
          if (errorCode) {
            bodyContent = `<strong>Error en la operación:</strong><br>${message} <br><small>Código: ${errorCode}</small>`;
          }

          const toastHTML = `
            <div id="${toastId}" class="toast align-items-center ${bgClass} border-0" role="alert" aria-live="assertive" aria-atomic="true">
              <div class="d-flex">
                <div class="toast-body">
                  <div class="d-flex align-items-center">
                    <i class="bi ${icon} fs-5 me-2"></i>
                    <div>${bodyContent}</div>
                  </div>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
              </div>
            </div>
          `;

          toastContainer.insertAdjacentHTML("beforeend", toastHTML);
          const toastElement = document.getElementById(toastId);
          const toast = new bootstrap.Toast(toastElement, {
            delay: type === "success" ? 3000 : 7000,
          });
          toast.show();
          toastElement.addEventListener("hidden.bs.toast", () =>
            toastElement.remove(),
          );
        }

        // Lógica para borrar la fecha (dejar como disponible)
        document
          .getElementById("clear-date-btn")
          .addEventListener("click", async () => {
            const id = document.getElementById("edit-id").value;

            if (
              !confirm(
                "¿Está seguro de que desea borrar la última fecha de presentación de este bosquejo?",
              )
            )
              return;

            try {
              const response = await fetch(
                `http://localhost:3000/api/bosquejos/${id}`,
                {
                  method: "PUT",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ fecha_ult: null }),
                },
              );

              if (response.ok) {
                const modalInstance = bootstrap.Modal.getInstance(
                  document.getElementById("editModal"),
                );
                modalInstance.hide();
                showNotification(
                  "La fecha ha sido borrada. El bosquejo ahora aparece como disponible.",
                  "success",
                );
                fetchBosquejos(); // Recargar tabla
              } else {
                const errorData = await response.json();
                showNotification(
                  errorData.error || "Error al intentar borrar la fecha",
                  "danger",
                  response.status,
                );
              }
            } catch (error) {
              showNotification(
                "Error de conexión con el servidor.",
                "danger",
                "FETCH_ERROR",
              );
            }
          });

        // Guardar cambios
        document
          .getElementById("save-date-btn")
          .addEventListener("click", async () => {
            const id = document.getElementById("edit-id").value;
            const nuevaFecha = document.getElementById("edit-fecha").value;

            try {
              const response = await fetch(
                `http://localhost:3000/api/bosquejos/${id}`,
                {
                  method: "PUT",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ fecha_ult: nuevaFecha }),
                },
              );

              if (response.ok) {
                const modalInstance = bootstrap.Modal.getInstance(
                  document.getElementById("editModal"),
                );
                modalInstance.hide();
                showNotification(
                  "La fecha de presentación se actualizó correctamente.",
                  "success",
                );
                fetchBosquejos(); // Recargar tabla
              } else {
                const errorData = await response.json();
                showNotification(
                  errorData.error || "Error al guardar fecha",
                  "danger",
                  response.status,
                );
              }
            } catch (error) {
              console.error("Error:", error);
              showNotification(
                "No se pudo conectar con el servidor.",
                "danger",
                "FETCH_ERROR",
              );
            }
          });

        // Guardar cambios de título
        document
          .getElementById("save-title-btn")
          .addEventListener("click", async () => {
            const id = document.getElementById("edit-title-id").value;
            const nuevoTitulo =
              document.getElementById("edit-titulo-input").value;

            if (!nuevoTitulo.trim()) {
              showNotification("El título no puede estar vacío", "danger");
              return;
            }

            try {
              const response = await fetch(
                `http://localhost:3000/api/bosquejos/${id}`,
                {
                  method: "PUT",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ titulo: nuevoTitulo }),
                },
              );

              if (response.ok) {
                const modalInstance = bootstrap.Modal.getInstance(
                  document.getElementById("editTitleModal"),
                );
                modalInstance.hide();
                showNotification(
                  "El título del discurso ha sido actualizado.",
                  "success",
                );
                fetchBosquejos(); // Recargar tabla
              } else {
                const errorData = await response.json();
                showNotification(
                  errorData.error || "Error al guardar título",
                  "danger",
                  response.status,
                );
              }
            } catch (error) {
              console.error("Error:", error);
              showNotification(
                "Error de conexión con el servidor.",
                "danger",
                "FETCH_ERROR",
              );
            }
          });

        // Eventos
        searchInput.addEventListener("input", updateDisplay);
        sortSelect.addEventListener("change", updateDisplay);

        fetchBosquejos();
      });
    </script>
